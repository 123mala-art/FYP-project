name: Auto Deploy

on:
  push:
    branches:
      - main
      - develop
      - development

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install & Build Frontend
      run: cd frontend && npm install && npm run build
    
    - name: Install Backend
      run: cd backend && npm install
      